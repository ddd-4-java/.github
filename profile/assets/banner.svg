<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="DDD-4-Java banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- Decorative DDD triangles -->
  <g opacity="0.15" stroke="#60a5fa" stroke-width="1.5" fill="none">
    <polygon points="100,40 160,40 130,15"/>
    <polygon points="100,80 160,80 130,105"/>
    <polygon points="100,160 160,160 130,135"/>
    <polygon points="100,200 160,200 130,225"/>
    <polygon points="100,280 160,280 130,255"/>
  </g>

  <!-- DDD layered rings -->
  <g transform="translate(1050, 160)" opacity="0.25" fill="none" stroke="#60a5fa" stroke-width="2">
    <circle r="30"/>
    <circle r="50"/>
    <circle r="70"/>
    <circle r="90"/>
    <circle r="110"/>
  </g>

  <!-- Java logo accent -->
  <g transform="translate(1080, 90)" opacity="0.85">
    <path d="M -22,-22 C -22,-22 -28,-4 -28,8 C -28,22 -18,32 -2,32 C 14,32 24,22 24,8 C 24,-4 18,-22 18,-22 C 18,-22 10,-12 -2,-12 C -14,-12 -22,-22 -22,-22 Z" fill="#f89820"/>
    <ellipse cx="-2" cy="8" rx="12" ry="6" fill="#5382a1" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="200" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="68" font-weight="800" fill="url(#title)" letter-spacing="-2">DDD-4-Java</text>

  <!-- Subtitle -->
  <text x="204" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#cbd5e1" letter-spacing="0.5">
    Domain-Driven Design building blocks for Java
  </text>

  <!-- Tagline -->
  <text x="204" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="16" font-weight="300" fill="#94a3b8" letter-spacing="1">
    Entity · AggregateRoot · Repository · CQRS · Event Sourcing
  </text>

  <!-- Partme-AI badge -->
  <g transform="translate(204, 250)">
    <rect x="0" y="0" width="240" height="34" rx="17" fill="#6366f1" opacity="0.95"/>
    <text x="120" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
      Part of partme-ai ecosystem
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="316" width="1200" height="4" fill="url(#accent)"/>
</svg>