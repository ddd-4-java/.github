<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="DDD-4-Java social preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1e3a5f"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Big Java logo watermark (right side) -->
  <g transform="translate(1000, 320)" opacity="0.10">
    <path d="M -100,-100 C -100,-100 -130,-20 -130,40 C -130,100 -80,150 -10,150 C 60,150 110,100 110,40 C 110,-20 80,-100 80,-100 C 80,-100 50,-50 -10,-50 C -70,-50 -100,-100 -100,-100 Z" fill="#f89820"/>
    <ellipse cx="0" cy="40" rx="60" ry="30" fill="#5382a1"/>
  </g>

  <!-- DDD layered circles -->
  <g transform="translate(150, 320)" opacity="0.30" fill="none" stroke="#60a5fa" stroke-width="2">
    <circle r="40"/>
    <circle r="70"/>
    <circle r="100"/>
    <circle r="130"/>
  </g>

  <!-- Title -->
  <text x="320" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="120" font-weight="800" fill="url(#title)" letter-spacing="-3">DDD-4-Java</text>

  <!-- Subtitle -->
  <text x="324" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="32" font-weight="400" fill="#cbd5e1" letter-spacing="0.5">
    Domain-Driven Design building blocks for Java
  </text>

  <!-- Tagline -->
  <text x="324" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="300" fill="#94a3b8" letter-spacing="2">
    Entity · AggregateRoot · Repository · CQRS · Event Sourcing
  </text>

  <!-- Partme-AI badge -->
  <g transform="translate(324, 460)">
    <rect x="0" y="0" width="320" height="50" rx="25" fill="#6366f1"/>
    <text x="160" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">
      🧠 Part of partme-ai ecosystem
    </text>
  </g>

  <!-- Java badge -->
  <g transform="translate(670, 460)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#f89820"/>
    <text x="100" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">
      ☕ Java
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="628" width="1280" height="12" fill="url(#title)"/>
</svg>